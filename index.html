<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌曲播放器</title>
    <link rel="stylesheet" href="fontawesome-free-6.7.2-web/css/fontawesome.css">
    <link rel="stylesheet" href="fontawesome-free-6.7.2-web/css/regular.css">
    <link rel="stylesheet" href="fontawesome-free-6.7.2-web/css/solid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" media="screen and (max-width: 991.98px)">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/cover.css">
    <link rel="stylesheet" href="css/lyric.css">
    <link rel="stylesheet" href="css/list.css">
    <link rel="stylesheet" href="css/color.css">
</head>

<body>
    <div class="bg h-auto min-vh-100 overflow-auto">
        <button class="color-toggle" aria-label="主题色选择"><i class="fa-solid fa-palette"></i></button>
        <div class="zone top flex-column gap-3 px-3 h-auto">
            <div class="box cover w-100 h-auto">
                <div class="box coverImg">
                    <img src="" alt="" class="paused">
                </div>
                <div class="text"></div>
            </div>
            <div class="box mainBox w-100 h-auto">
                <audio controls class="w-100"></audio>
                <div class="lyricsBox">
                    <div>
                        <div class="beforeBlank"></div>
                        <div class="center time hidden"></div>
                        <div class="center indicator hidden"></div>
                        <i class="center fa-solid fa-play fa-sm hidden"></i>
                        <div class="lyrics"></div>
                        <div class="afterBlank"></div>
                    </div>
                </div>
                <div class="buttonBox">
                    <div>
                        <i class="fa-solid fa-rotate fa-lg"></i>
                        <i class="fa-solid fa-shuffle none"></i>
                        <i class="fa-solid fa-1 none"></i>
                    </div>
                    <div>
                        <i class="fa-solid fa-backward-step fa-xl"></i>
                    </div>
                    <div>
                        <i class="fa-solid fa-play fa-xl"></i>
                    </div>
                    <div>
                        <i class="fa-solid fa-forward-step fa-xl"></i>
                    </div>
                    <div>
                        <i class="fa-regular fa-heart fa-lg"></i>
                    </div>
                </div>
            </div>
            <div class="box listBox w-100 h-auto">
                <div class="search">
                    <i class="fa-solid fa-magnifying-glass fa-xl"></i>
                    <input type="text" class="form-control" placeholder="请输入你想搜索的歌曲的歌名或歌手">
                </div>
                <div class="list">
                </div>
            </div>
        </div>
        <div class="zone bottom flex-column gap-3 px-3 h-auto">
            <div class="box colorChoose w-100 h-auto">
                <div class="text">主题色<br>选择</div>
                <div class="color blue">
                    <div></div>
                    <p class="text">#66A3F4</p>
                </div>
                <div class="color green">
                    <div></div>
                    <p class="text">#89B566</p>
                </div>
                <div class="color purple">
                    <div></div>
                    <p class="text">#9270CA</p>
                </div>
                <div class="color red">
                    <div></div>
                    <p class="text">#E6450F</p>
                </div>
                <div class="color pink">
                    <div></div>
                    <p class="text">#FF99B1</p>
                </div>
                <div class="color orange">
                    <div></div>
                    <p class="text">#FF963E</p>
                </div>
            </div>
        </div>
        <div class="text completeTime">重构于<br>2025.12.07</div>
        <div class="text watermark">修改制作：<br><p><a href="https://github.com/jibansst" target="_blank" style="text-decoration: none; color: white">羁绊youso</a><br><a href="https://github.com/Suisuroru" target="_blank" style="text-decoration: none; color: white">Helvetica Volubi</a></p></div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/player.js" defer></script>
</body>

</html>
